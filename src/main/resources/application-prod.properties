# ?? PostgreSQL Render ?????????????????????????????????????????
spring.datasource.url=jdbc:postgresql://your-render-host:5432/blood_donation_db
spring.datasource.username=your_render_db_user
spring.datasource.password=your_render_db_password
spring.datasource.driver-class-name=org.postgresql.Driver

# ?? JPA / Hibernate ??????????????????????????????????????????
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=validate

# ?? Logging ??????????????????????????????????????????????????
logging.level.com.bdms=INFO
logging.level.org.springframework.security=WARN